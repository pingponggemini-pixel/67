<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瘋狂周祐慶產生器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #0c0c14; /* 更深邃的夜空藍 */
            overflow: hidden;
            position: relative;
            user-select: none;
            cursor: pointer;
        }
        /* 提示字 */
        .tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #444455;
            font-family: sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
        }
        /* 升級版 67 樣式 */
        .number-67 {
            position: absolute;
            font-weight: 900; /* 讓字體更粗更明顯 */
            font-family: 'Impact', 'Arial Black', sans-serif;
            pointer-events: none;
            will-change: transform, opacity; /* 優化效能 */
        }
    </style>
</head>
<body>

    <div class="tip">用力點擊畫面試試看！</div>

    <script>
        document.addEventListener('click', (e) => {
            // 移除提示字
            const tip = document.querySelector('.tip');
            if (tip) tip.remove();

            // 隨機決定這次噴出的數量（5 到 15 個，更有豐富感）
            const count = Math.floor(Math.random() * 11) + 5; 

            for (let i = 0; i < count; i++) {
                createExploding67(e.clientX, e.clientY);
            }
        });

        function createExploding67(startX, startY) {
            const el = document.createElement('div');
            el.className = 'number-67';
            el.innerText = '67';

            // 1. 隨機鮮豔顏色
            const hue = Math.floor(Math.random() * 360);
            el.style.color = `hsl(${hue}, 100%, 65%)`;
            // 加點發光效果
            el.style.textShadow = `0 0 10px hsl(${hue}, 100%, 65%)`;

            // 2. 隨機大小（24px 到 70px）
            const size = Math.floor(Math.random() * 47) + 24;
            el.style.fontSize = `${size}px`;

            document.body.appendChild(el);

            // 3. 物理模擬：給予隨機的初始速度與角度
            const angle = Math.random() * Math.PI * 2; // 360度隨機方向
            const speed = Math.random() * 8 + 4;       // 隨機噴射速度
            
            let velocityX = Math.cos(angle) * speed;
            let velocityY = Math.sin(angle) * speed - 2; // 稍微向上噴一點
            let currentX = startX;
            let currentY = startY;
            let rotation = Math.random() * 360;
            const rotationSpeed = (Math.random() - 0.5) * 10; // 旋轉速度
            
            const gravity = 0.3; // 重力加速度
            let opacity = 1;

            // 使用 JavaScript 的 requestAnimationFrame 來做流暢的物理動畫
            function updateAnimation() {
                // 套用速度
                currentX += velocityX;
                currentY += velocityY;
                velocityY += gravity; // 重力往下灌
                rotation += rotationSpeed;
                opacity -= 0.02; // 逐漸淡出

                // 更新位置與旋轉
                el.style.transform = `translate(-50%, -50%) translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;
                el.style.opacity = opacity;

                if (opacity > 0) {
                    requestAnimationFrame(updateAnimation);
                } else {
                    el.remove(); // 完全透明後刪除
                }
            }

            // 啟動動畫
            requestAnimationFrame(updateAnimation);
        }
    </script>
</body>
</html>
