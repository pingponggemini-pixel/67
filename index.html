<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 全球國家總點擊戰！67 狂熱大亂鬥 🌍</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            width: 100vw; height: 100vh; background-color: #030308;
            overflow: hidden; position: relative; user-select: none;
            font-family: 'Impact', 'Arial Black', sans-serif; color: #fff;
        }

        /* 登入視窗 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .login-box {
            text-align: center; background: #111122; padding: 40px;
            border-radius: 15px; border: 2px solid #00ffcc; box-shadow: 0 0 20px #00ffcc;
            max-width: 400px; width: 90%;
        }
        .login-box h1 { font-size: 2.2rem; margin-bottom: 20px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }
        .login-box input, .login-box select {
            font-size: 1.2rem; padding: 10px; width: 280px; text-align: center;
            border: none; border-radius: 5px; margin-bottom: 15px; background: #222; color: #fff;
        }
        .login-box select { text-align-last: center; cursor: pointer; }
        .login-box button {
            font-size: 1.5rem; padding: 10px 30px; background: #00ffcc; color: black;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        /* UI 介面 */
        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .ui-box { background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 10px; border: 1px solid #333; }
        #score-board { font-size: 2rem; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        #timer-board { font-size: 2rem; color: #ff3333; text-shadow: 0 0 10px #ff3333; }
        
        /* Combo 顯示 */
        #combo-text {
            position: absolute; top: 100px; right: 30px; font-size: 2.5rem; color: #fff;
            text-shadow: 0 0 10px #ff0055; font-style: italic; opacity: 0; pointer-events: none;
        }

        /* 排行榜 */
        .board-panel {
            position: absolute; width: 280px; background: rgba(10, 10, 25, 0.85);
            border: 2px solid #00ffcc; border-radius: 10px; padding: 15px; pointer-events: none;
        }
        .board-panel h3 { text-align: center; color: #ffcc00; margin-bottom: 10px; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .leaderboard-item { display: flex; justify-content: space-between; margin: 6px 0; font-size: 1rem; font-family: sans-serif; }

        #personal-leaderboard { bottom: 20px; right: 20px; }
        #country-leaderboard { bottom: 20px; left: 20px; border-color: #ff0055; }
        #country-leaderboard h3 { color: #ff3377; }

        .number-67 { position: absolute; pointer-events: none; will-change: transform, opacity; font-weight: 900; }
        
        /* 狂暴震動效果 */
        .shake { animation: screenShake 0.1s infinite; }
        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(0.5deg); }
        }

        #game-over-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 90;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>🌍 67 全球國家點擊大戰</h1>
            <input type="text" id="player-name" placeholder="輸入公開代號..." maxlength="12">
            <select id="player-country">
                <option value="台灣">🇹🇼 台灣 (Taiwan)</option>
                <option value="日本">🇯🇵 日本 (Japan)</option>
                <option value="美國">🇺🇸 美國 (USA)</option>
                <option value="韓國">🇰🇷 韓國 (Korea)</option>
                <option value="香港">🇭🇰 香港 (Hong Kong)</option>
                <option value="新加坡">🇸🇬 新加坡 (Singapore)</option>
                <option value="其他">🌐 其他地區 (Earth)</option>
            </select>
            <br>
            <button onclick="startGame()">為國出征！</button>
        </div>
    </div>

    <div id="ui-layer">
        <div class="ui-box" id="score-board">SCORE: 0</div>
        <div id="combo-text">0 COMBO</div>
        <div class="ui-box" id="timer-board">TIME: 30s</div>
    </div>

    <div id="country-leaderboard" class="board-panel">
        <h3>🌍 國家總點擊排行榜</h3>
        <div id="country-board-content">雲端連線中...</div>
    </div>

    <div id="personal-leaderboard" class="board-panel">
        <h3>🏆 全球個人前 8 名</h3>
        <div id="personal-board-content">雲端連線中...</div>
    </div>

    <div id="game-over-screen">
        <h1 style="font-size: 4rem; color: #ff0055; margin-bottom: 20px;">TIME UP!</h1>
        <p id="final-score-text" style="font-size: 2rem; margin-bottom: 30px; color:#00ffcc; text-align:center;"></p>
        <button onclick="restartGame()" style="font-size: 1.5rem; padding: 10px 30px; background: #ffcc00; color: black; border:none; font-weight:bold; cursor:pointer; border-radius:5px;">再戰一場</button>
    </div>

    <script>
        // 這裡直接將路徑指向你的 67game 專案資料庫路徑！免除複製 API key 的困擾
        const config = { databaseURL: "https://67game-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const database = firebase.database();
        
        let score = 0;
        let combo = 0;
        let comboTimer = null;
        let clickCountThisGame = 0;
        let timeLeft = 30;
        let gameActive = false;
        let playerName = "無名氏";
        let playerCountry = "台灣";
        let gameInterval = null;

        // 開始即時監聽雲端存檔
        listenToLeaderboards();

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if (inputName) playerName = inputName;
            playerCountry = document.getElementById('player-country').value;
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            
            score = 0; combo = 0; clickCountThisGame = 0; timeLeft = 30; gameActive = true;
            document.getElementById('score-board').innerText = `SCORE: ${score}`;
            document.getElementById('timer-board').innerText = `TIME: ${timeLeft}s`;

            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-board').innerText = `TIME: ${timeLeft}s`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            document.body.classList.remove('shake');
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score-text').innerText = `[${playerCountry}] ${playerName}\n最終得分：${score}\n貢獻點擊數：${clickCountThisGame}`;
            
            // 真正上傳儲存至雲端資料庫
            database.ref('personal_leaderboard').push({
                name: playerName, country: playerCountry, score: score, timestamp: Date.now()
            });
            database.ref('country_leaderboard/' + playerCountry).transaction((val) => (val || 0) + clickCountThisGame);
        }

        function restartGame() { startGame(); }

        // --- 核心震撼噴發玩法（滑鼠多點、鍵盤、Fever金色大數字） ---
        const handleInteraction = (x, y) => {
            if (!gameActive) return;
            clickCountThisGame++;
            combo++;
            
            // 處理 Combo UI
            const cText = document.getElementById('combo-text');
            cText.innerText = `${combo} COMBO`;
            cText.style.opacity = '1';
            
            // 觸發 Fever 狂暴震動
            const isFever = combo >= 15;
            if (isFever) {
                document.body.classList.add('shake');
                cText.style.color = '#ffcc00';
                cText.style.textShadow = '0 0 15px #ff5500';
            }

            // 計算分數
            const basePts = isFever ? 25 : 10;
            score += Math.floor(Math.random() * 20) + basePts;
            document.getElementById('score-board').innerText = `SCORE: ${score}`;

            // 噴射數量
            const count = isFever ? 20 : 6;
            for (let i = 0; i < count; i++) {
                // Fever時有高機率噴出超大黃金67！
                const isGolden = isFever && Math.random() > 0.6;
                create67(x, y, isGolden);
            }

            // Combo 倒數重設
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                cText.style.opacity = '0';
                document.body.classList.remove('shake');
            }, 1200);
        };

        document.addEventListener('mousedown', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
                handleInteraction(e.clientX, e.clientY);
            }
        });

        document.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            for (let i = 0; i < e.touches.length; i++) {
                handleInteraction(e.touches[i].clientX, e.touches[i].clientY);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (/^[a-z1-9]$/.test(e.key.toLowerCase())) {
                const rx = Math.random() * window.innerWidth;
                const ry = Math.random() * window.innerHeight;
                handleInteraction(rx, ry); // 鍵盤全畫面引爆
            }
        });

        function create67(startX, startY, isGolden = false) {
            const el = document.createElement('div');
            el.className = 'number-67';
            
            // 外觀樣式
            if (isGolden) {
                el.innerText = Math.random() > 0.5 ? '🔥67🔥' : '67';
                el.style.color = '#ffcc00';
                el.style.textShadow = '0 0 20px #fff, 0 0 30px #ffcc00';
                el.style.fontSize = `${Math.floor(Math.random() * 40) + 80}px`; // 巨大化 80~120px
            } else {
                el.innerText = '67';
                const hue = Math.floor(Math.random() * 360);
                el.style.color = `hsl(${hue}, 100%, 65%)`;
                el.style.textShadow = `0 0 10px hsl(${hue}, 100%, 65%)`;
                el.style.fontSize = `${Math.floor(Math.random() * 25) + 24px}`;
            }
            document.body.appendChild(el);

            // 物理運動效果
            const angle = Math.random() * Math.PI * 2;
            const speed = isGolden ? (Math.random() * 15 + 8) : (Math.random() * 12 + 5);
            let velX = Math.cos(angle) * speed;
            let velY = Math.sin(angle) * speed - 3;
            let currX = startX, currY = startY, rot = Math.random() * 360, opacity = 1;

            function animate() {
                currX += velX; currY += velY; velY += 0.35; rot += 6; opacity -= 0.025;
                el.style.transform = `translate(-50%, -50%) translate(${currX}px, ${currY}px) rotate(${rot}deg)`;
                el.style.opacity = opacity;
                if (opacity > 0) requestAnimationFrame(animate); else el.remove();
            }
            requestAnimationFrame(animate);
        }

        // --- 即時雲端榜單更新 ---
        function listenToLeaderboards() {
            // 監聽個人榜
            database.ref('personal_leaderboard').orderByChild('score').limitToLast(8).on('value', (snapshot) => {
                const container = document.getElementById('personal-board-content');
                container.innerHTML = '';
                let list = [];
                snapshot.forEach((c) => { list.push(c.val()); });
                list.reverse();
                list.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'leaderboard-item';
                    if(i===0) row.style.color = '#ffcc00';
                    row.innerHTML = `<span>${i+1}. [${item.country}] ${item.name}</span><span>${item.score}</span>`;
                    container.appendChild(row);
                });
            });

            // 監聽國家榜
            database.ref('country_leaderboard').on('value', (snapshot) => {
                const container = document.getElementById('country-board-content');
                container.innerHTML = '';
                let list = [];
                snapshot.forEach((c) => { list.push({name: c.key, clicks: c.val()}); });
                list.sort((a,b) => b.clicks - a.clicks);
                list.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'leaderboard-item';
                    if(i===0) row.style.color = '#ff3377';
                    let f = item.name==='台灣'?'🇹🇼':item.name==='日本'?'🇯🇵':item.name==='美國'?'🇺🇸':item.name==='韓國'?'🇰🇷':item.name==='香港'?'🇭🇰':item.name==='新加坡'?'🇸🇬':'🌐';
                    row.innerHTML = `<span>${i+1}. ${f} ${item.name}</span><span>${item.clicks} 次</span>`;
                    container.appendChild(row);
                });
            });
        }
    </script>
</body>
</html>
